<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoleDecoded</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F5F2EC;
  --surface: #FFFDFB;
  --surface-raised: #FFFFFF;
  --surface-alt: #EFEBE5;
  --ink: #2C2926;
  --ink-soft: #5E5850;
  --ink-muted: #9E9790;
  --accent: #C47A6E;
  --accent-hover: #AD6458;
  --accent-soft: #E8C4BE;
  --green: #5E9477;
  --green-bg: #E4EFEA;
  --amber: #B8924E;
  --amber-bg: #F3EBDA;
  --red: #BF6B6B;
  --red-bg: #F3E2E2;
  --border: #E2DDD6;
  --border-light: #EDE9E3;
  --lavender: #A99CC3;
  --lavender-bg: #ECE8F3;
  --sage: #8FAD8C;
  --sage-bg: #E5EDE4;
  --teal: #6FA3A8;
  --teal-bg: #E0ECEE;
  --rose: #C08A99;
  --rose-bg: #F2E5EA;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Top Bar ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(245, 242, 236, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-light);
  padding: 0 24px;
}

.topbar-inner {
  max-width: 820px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.topbar-brand {
  font-family: 'Fraunces', serif;
  font-size: 1.2rem;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.02em;
}

.topbar-actions {
  display: flex;
  gap: 4px;
}

.topbar-btn {
  background: transparent;
  border: none;
  color: var(--ink-muted);
  font-size: 0.78rem;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 100px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
  position: relative;
  font-family: 'DM Sans', sans-serif;
}

.topbar-btn:hover {
  background: var(--surface-alt);
  color: var(--ink);
}

.topbar-btn.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow);
}

.topbar-btn svg { width: 15px; height: 15px; }

.dot-indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: none;
}

.dot-indicator.on { display: block; }

/* ── Main Layout ── */
.main {
  max-width: 820px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ── Hero Input ── */
.hero-card {
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow-md);
  margin-bottom: 32px;
}

.hero-label {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}

.hero-sublabel {
  font-size: 0.85rem;
  color: var(--ink-muted);
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  line-height: 1.7;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  resize: vertical;
  transition: border-color var(--transition), box-shadow var(--transition);
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

textarea:disabled { opacity: 0.55; cursor: not-allowed; }

.hero-textarea { min-height: 220px; }

.hero-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  align-items: center;
}

button {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  padding: 10px 22px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-analyze {
  background: var(--ink);
  color: var(--bg);
  padding: 12px 32px;
  font-size: 0.88rem;
  font-weight: 600;
}

.btn-analyze:hover { background: #3a3733; }
.btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-clear {
  background: transparent;
  color: var(--ink-muted);
  padding: 12px 16px;
}
.btn-clear:hover { color: var(--ink); }

/* ── Loading ── */
.loader {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 56px 0;
  gap: 16px;
}

.loader.active { display: flex; }

.loader-bar {
  width: 200px;
  height: 3px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.loader-bar-fill {
  height: 100%;
  width: 30%;
  background: linear-gradient(90deg, var(--accent), var(--lavender));
  border-radius: 10px;
  animation: slide 1.5s ease-in-out infinite;
}

@keyframes slide {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

.loader-text {
  font-size: 0.85rem;
  color: var(--ink-muted);
  font-style: italic;
}

/* ── Results ── */
#results { display: none; }
#results.visible { display: block; animation: fadeUp 0.4s ease-out; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Verdict (top of results) */
.verdict-card {
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 32px;
  box-shadow: var(--shadow-md);
  margin-bottom: 20px;
}

.verdict-top {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.verdict-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 7px 22px;
  border-radius: 100px;
  flex-shrink: 0;
}

.verdict-pursue { background: var(--green-bg); color: var(--green); border: 1px solid var(--sage); }
.verdict-explore { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber); }
.verdict-skip { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }

.verdict-headline {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--ink);
}

.verdict-text {
  font-size: 0.9rem;
  color: var(--ink-soft);
  line-height: 1.75;
}

.look-instead {
  margin-top: 24px;
  padding: 20px 24px;
  background: var(--lavender-bg);
  border-left: 3px solid var(--lavender);
  border-radius: var(--radius-sm);
}

.look-instead h4 {
  font-family: 'Fraunces', serif;
  font-size: 0.95rem;
  font-weight: 400;
  color: var(--lavender);
  margin-bottom: 8px;
}

.look-instead p { font-size: 0.86rem; color: var(--ink-soft); line-height: 1.7; }

/* Scores Card */
.scores-card {
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 32px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

.card-header {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
}

.score-grid { display: grid; gap: 8px; }

.score-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  background: var(--bg);
  transition: background var(--transition);
}

.score-row:hover { background: var(--surface-alt); }

.score-dim {
  font-size: 0.84rem;
  font-weight: 500;
  color: var(--ink);
  min-width: 155px;
  flex-shrink: 0;
}

.score-badge {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 3px 10px;
  border-radius: 100px;
  white-space: nowrap;
  flex-shrink: 0;
}

.badge-strong { background: var(--green-bg); color: var(--green); }
.badge-partial { background: var(--amber-bg); color: var(--amber); }
.badge-gap { background: var(--red-bg); color: var(--red); }

.score-note { font-size: 0.8rem; color: var(--ink-muted); line-height: 1.45; }

/* Parsed JD — Accordion */
.parsed-card {
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 32px;
}

.parsed-card .card-header {
  padding: 20px 32px 16px;
  margin: 0;
  border-bottom: none;
}

.accordion-item {
  border-top: 1px solid var(--border-light);
}

.accordion-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  background: transparent;
  border: none;
  border-radius: 0;
  cursor: pointer;
  transition: background var(--transition);
  font-family: 'DM Sans', sans-serif;
}

.accordion-trigger:hover { background: rgba(0,0,0,0.015); }

.accordion-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.accordion-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.accordion-count {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--ink-muted);
  background: var(--surface-alt);
  padding: 2px 8px;
  border-radius: 100px;
}

.accordion-chevron {
  width: 16px; height: 16px;
  color: var(--ink-muted);
  transition: transform var(--transition);
  flex-shrink: 0;
}

.accordion-item.open .accordion-chevron { transform: rotate(180deg); }

.accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.accordion-item.open .accordion-body { max-height: 1000px; }

.accordion-content {
  padding: 0 32px 18px;
}

.accordion-content ul { list-style: none; }

.accordion-content li {
  padding: 4px 0;
  font-size: 0.84rem;
  color: var(--ink-soft);
  line-height: 1.55;
}

.accordion-content li::before {
  content: '–';
  margin-right: 8px;
  color: var(--ink-muted);
}

/* Category colors */
.acc-responsibilities .accordion-label { color: var(--teal); }
.acc-responsibilities .accordion-dot { background: var(--teal); }

.acc-hard-skills .accordion-label { color: var(--lavender); }
.acc-hard-skills .accordion-dot { background: var(--lavender); }

.acc-soft-skills .accordion-label { color: var(--sage); }
.acc-soft-skills .accordion-dot { background: var(--sage); }

.acc-nice-to-haves .accordion-label { color: var(--amber); }
.acc-nice-to-haves .accordion-dot { background: var(--amber); }

.acc-culture .accordion-label { color: var(--rose); }
.acc-culture .accordion-dot { background: var(--rose); }

.acc-red-flags .accordion-label { color: var(--red); }
.acc-red-flags .accordion-dot { background: var(--red); }

/* ── Panels (Profile & History) ── */
.panel-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.2);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.panel-overlay.open { opacity: 1; pointer-events: all; }

.panel {
  position: fixed;
  top: 0;
  right: -460px;
  width: 440px;
  max-width: 90vw;
  height: 100vh;
  background: var(--surface);
  z-index: 210;
  box-shadow: var(--shadow-lg);
  transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
}

.panel.open { right: 0; }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}

.panel-title {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem;
  font-weight: 400;
}

.panel-close {
  background: none;
  border: none;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  display: flex;
  transition: color var(--transition);
}

.panel-close:hover { color: var(--ink); }
.panel-close svg { width: 20px; height: 20px; }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.panel-body label {
  display: block;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

.panel-body textarea { min-height: 180px; }

.field + .field { margin-top: 20px; }

.panel-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border-light);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

.btn-save {
  background: var(--ink);
  color: var(--bg);
  flex: 1;
}
.btn-save:hover { background: #3a3733; }

.btn-secondary {
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--ink-soft); color: var(--ink); }

/* ── API Key (inside profile panel) ── */
.panel-body input[type="password"] {
  width: 100%;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: border-color var(--transition);
}

.panel-body input[type="password"]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* ── History Panel ── */
.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  background: var(--bg);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid transparent;
}

.history-item:hover {
  background: var(--surface-alt);
  border-color: var(--border);
}

.history-meta { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }

.history-title {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-date { font-size: 0.72rem; color: var(--ink-muted); }

.history-arrow {
  color: var(--ink-muted);
  flex-shrink: 0;
  margin-left: 12px;
  opacity: 0;
  transform: translateX(-4px);
  transition: all var(--transition);
}

.history-item:hover .history-arrow {
  opacity: 1;
  transform: translateX(0);
}

.history-arrow svg { width: 14px; height: 14px; }

.history-empty {
  font-size: 0.85rem;
  color: var(--ink-muted);
  font-style: italic;
  padding: 24px 0;
  text-align: center;
}

/* ── Error ── */
.error-msg {
  display: none;
  background: var(--red-bg);
  color: var(--red);
  font-size: 0.84rem;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-top: 16px;
}

.error-msg.visible { display: block; }

/* ── Footer ── */
footer {
  max-width: 820px;
  margin: 0 auto;
  padding: 24px;
  text-align: center;
  font-size: 0.75rem;
  color: var(--ink-muted);
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .hero-label { font-size: 1.25rem; }
  .hero-card, .verdict-card, .scores-card { padding: 24px 20px; }
  .accordion-trigger { padding: 14px 20px; }
  .accordion-content { padding: 0 20px 16px; }
  .parsed-card .card-header { padding: 16px 20px 12px; }
  .score-row { flex-direction: column; gap: 4px; }
  .score-dim { min-width: auto; }
  .verdict-top { flex-direction: column; align-items: flex-start; gap: 10px; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-inner">
    <span class="topbar-brand">RoleDecoded</span>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="openPanel('history')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </button>
      <button class="topbar-btn" onclick="openPanel('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        Profile
        <span id="profile-dot" class="dot-indicator"></span>
      </button>
    </div>
  </div>
</div>

<!-- Overlay -->
<div id="panel-overlay" class="panel-overlay" onclick="closeAllPanels()"></div>

<!-- Profile Panel -->
<div id="profile-panel" class="panel">
  <div class="panel-header">
    <span class="panel-title">My Profile</span>
    <button class="panel-close" onclick="closeAllPanels()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="panel-body">
    <div class="field">
      <label for="api-key">API Key</label>
      <input type="password" id="api-key" placeholder="sk-ant-…" />
    </div>
    <div class="field">
      <label for="materials">Professional Materials</label>
      <textarea id="materials" placeholder="Paste your resume, case studies, certifications…"></textarea>
    </div>
    <div class="field">
      <label for="filter">My Filter</label>
      <textarea id="filter" placeholder="Values, dealbreakers, triggers, preferences…"></textarea>
    </div>
  </div>
  <div class="panel-footer">
    <button class="btn-save" onclick="saveProfile()">Save Profile</button>
    <button class="btn-secondary" onclick="closeAllPanels()">Cancel</button>
  </div>
</div>

<!-- History Panel -->
<div id="history-panel" class="panel">
  <div class="panel-header">
    <span class="panel-title">Past Analyses</span>
    <button class="panel-close" onclick="closeAllPanels()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="panel-body">
    <div id="history-list"></div>
  </div>
</div>

<!-- Main Content -->
<div class="main">
  <!-- Hero: JD Input -->
  <div class="hero-card">
    <div class="hero-label">Paste a job description</div>
    <div class="hero-sublabel">Get an honest read before you invest your energy.</div>
    <textarea id="jd" class="hero-textarea" placeholder="Paste the full job listing text here…"></textarea>
    <div class="hero-actions">
      <button id="btn-analyze" class="btn-analyze" onclick="analyze()">Generate Analysis</button>
      <button class="btn-clear" onclick="clearAnalysis()">Clear</button>
    </div>
    <div id="error-msg" class="error-msg"></div>
  </div>

  <!-- Loading -->
  <div id="loader" class="loader">
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <div class="loader-text">Reading between the lines…</div>
  </div>

  <!-- Results -->
  <div id="results">
    <!-- Verdict first -->
    <div id="verdict-container" class="verdict-card"></div>

    <!-- Scores -->
    <div id="scores-container" class="scores-card"></div>

    <!-- Parsed JD Accordion -->
    <div id="parsed-container" class="parsed-card"></div>
  </div>
</div>

<footer>RoleDecoded · MVP · Not legal or career advice</footer>

<script>
// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  ['rl_materials', 'rl_filter', 'rl_apikey'].forEach(key => {
    const val = localStorage.getItem(key);
    if (!val) return;
    const map = { rl_materials: 'materials', rl_filter: 'filter', rl_apikey: 'api-key' };
    document.getElementById(map[key]).value = val;
  });
  updateProfileDot();
  renderHistory();
});

function updateProfileDot() {
  const has = localStorage.getItem('rl_materials') || localStorage.getItem('rl_filter');
  document.getElementById('profile-dot').classList.toggle('on', !!has);
}

// ── Panels ──
function openPanel(name) {
  closeAllPanels();
  document.getElementById(name + '-panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
}

function closeAllPanels() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
  document.getElementById('panel-overlay').classList.remove('open');
}

function saveProfile() {
  localStorage.setItem('rl_materials', document.getElementById('materials').value);
  localStorage.setItem('rl_filter', document.getElementById('filter').value);
  localStorage.setItem('rl_apikey', document.getElementById('api-key').value);
  updateProfileDot();
  closeAllPanels();
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('visible');
}

function hideError() { document.getElementById('error-msg').classList.remove('visible'); }

function clearAnalysis() {
  document.getElementById('jd').value = '';
  document.getElementById('results').classList.remove('visible');
  hideError();
}

// ── History ──
function getHistory() {
  try { return JSON.parse(localStorage.getItem('rl_history') || '[]'); } catch { return []; }
}

function saveToHistory(jdText, result) {
  const history = getHistory();
  const title = jdText.split('\n').find(l => l.trim().length > 5)?.trim().slice(0, 80) || 'Untitled Role';
  history.unshift({
    id: Date.now(), title,
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }),
    recommendation: result.verdict.recommendation,
    data: result
  });
  if (history.length > 50) history.length = 50;
  localStorage.setItem('rl_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const history = getHistory();
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">No analyses yet.<br>They\'ll show up here automatically.</div>';
    return;
  }
  list.innerHTML = history.map((item, i) => {
    const cls = item.recommendation === 'Pursue' ? 'badge-strong' : item.recommendation === 'Skip' ? 'badge-gap' : 'badge-partial';
    return `<div class="history-item" onclick="loadHistory(${i})">
      <div class="history-meta">
        <span class="history-title">${item.title}</span>
        <span class="history-date">${item.date}</span>
      </div>
      <span class="score-badge ${cls}" style="margin-left:12px;">${item.recommendation}</span>
      <span class="history-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </div>`;
  }).join('');
}

function loadHistory(i) {
  const h = getHistory();
  if (h[i]) {
    renderResults(h[i].data);
    closeAllPanels();
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ── Accordion ──
function toggleAccordion(el) {
  el.closest('.accordion-item').classList.toggle('open');
}

// ── Streaming Analysis ──
async function analyze() {
  hideError();
  const apiKey = document.getElementById('api-key').value.trim();
  const materials = document.getElementById('materials').value.trim();
  const filter = document.getElementById('filter').value.trim();
  const jd = document.getElementById('jd').value.trim();

  if (!apiKey) return showError('Add your API key in Profile settings (top right).');
  if (!materials && !filter) return showError('Set up your profile first (top right).');
  if (!jd) return showError('Paste a job description above.');

  const btn = document.getElementById('btn-analyze');
  const loader = document.getElementById('loader');
  btn.disabled = true;
  loader.classList.add('active');
  document.getElementById('results').classList.remove('visible');

  const systemPrompt = `You are a trauma-informed career counselor for a specific person. You know their full professional history, their values, their dealbreakers, and their psychological patterns around job searching. Your job is to stand between them and a job listing and give them an honest, grounded assessment so they don't have to white-knuckle their way through parsing it themselves.

You are not a cheerleader. You are not pessimistic. You are balanced, honest, and protective without being overprotective. You know this person needs income and can't be infinitely picky. You also know that sending them back into an environment that mirrors what broke them would be worse than no job at all. Your job is to help them make the best decision with facts, because their trauma, decision fatigue, ADHD, and OCD make it nearly impossible to evaluate listings neutrally on their own.

Tone: Direct, warm, slightly irreverent. Translate corporate jargon into plain language. Don't sanitize but don't catastrophize. When something is a red flag, say so and say why. When something looks genuinely good, say so without hedging. Give a clear recommendation, not a list of pros and cons they have to weigh themselves — the decision fatigue is the whole problem.

When you receive a job description, do three things:

One — Parse the listing. Break it into these categories:
- What you'd actually be doing day to day (strip the fluff, describe the real work)
- Hard skills required (be specific about what's actually required vs. preferred)
- Soft skills and qualities they're looking for
- Nice-to-haves (things listed as preferred or bonus)
- Culture signals (what the language tells you about the environment — positive and negative)
- Red flags (anything that suggests misalignment with this person's needs, including subtle ones)
Translate every piece of corporate speak into plain language. Be accurate, not snarky for the sake of it, but don't let vague language hide what the job actually is.

Two — Score the match. Evaluate the listing against this person's profile and filter across these dimensions. For each one, rate it as Strong Match, Partial Match, or Gap, and explain why in one to two sentences:
- Values alignment: does this organization's mission and approach match what this person cares about?
- Experience relevance: how well does their background map to what's being asked for?
- Skills match: do they have the hard and soft skills required?
- Culture fit: based on the language and signals, would this environment work for their brain and their needs?
- Autonomy and structure: does this role offer the balance of external scaffolding and personal freedom they need?
- Growth potential: does this role lead somewhere, or is it a dead end?
- Logistical fit: location, schedule flexibility, sensory environment, travel requirements

Three — The verdict. Give a clear, honest overall assessment in a short paragraph. Answer: Is this worth their time and energy to apply? Why or why not? What's the best case version of this role? What's the risk? If they applied, what would they need to emphasize? If they shouldn't apply, say so directly and say why without softening it. End with one of three recommendations: Pursue, Explore with Caution, or Skip.

If the recommendation is Skip or Explore with Caution, include a section called "What To Look For Instead" that describes what a better-fitting version of this role would look like based on the specific gaps identified. Be concrete — mention job titles, types of organizations, and specific language to search for that would better match this person's profile and values.

---

Below is this person's professional profile:
${materials}

Below is this person's personal filter — their values, dealbreakers, triggers, and what they need:
${filter}

---

CRITICAL OUTPUT FORMAT INSTRUCTION: You MUST respond with ONLY valid JSON. No markdown, no backticks, no commentary before or after. Use this exact schema:

{
  "parsed_jd": {
    "responsibilities": ["..."],
    "hard_skills": ["..."],
    "soft_skills": ["..."],
    "nice_to_haves": ["..."],
    "culture_signals": ["..."],
    "red_flags": ["..."]
  },
  "scores": [
    { "dimension": "Values Alignment", "rating": "Strong Match|Partial Match|Gap", "explanation": "..." },
    { "dimension": "Experience Relevance", "rating": "...", "explanation": "..." },
    { "dimension": "Skills Match", "rating": "...", "explanation": "..." },
    { "dimension": "Culture Fit", "rating": "...", "explanation": "..." },
    { "dimension": "Autonomy & Structure", "rating": "...", "explanation": "..." },
    { "dimension": "Growth Potential", "rating": "...", "explanation": "..." },
    { "dimension": "Logistical Fit", "rating": "...", "explanation": "..." }
  ],
  "verdict": {
    "recommendation": "Pursue|Explore with Caution|Skip",
    "assessment": "Your honest overall assessment paragraph here.",
    "look_instead": "Only include this field if recommendation is Skip or Explore with Caution. Concrete guidance on what to search for instead."
  }
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        stream: true,
        system: systemPrompt,
        messages: [{ role: 'user', content: `Analyze this job description:\n\n${jd}` }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '', buffer = '';

    const loaderText = document.querySelector('.loader-text');
    const phases = ['Reading between the lines…', 'Translating the corporate speak…', 'Scoring the match…', 'Forming a verdict…'];
    let phase = 0;
    const phaseInterval = setInterval(() => {
      phase = Math.min(phase + 1, phases.length - 1);
      loaderText.textContent = phases[phase];
    }, 4000);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6).trim();
        if (d === '[DONE]') continue;
        try {
          const ev = JSON.parse(d);
          if (ev.type === 'content_block_delta' && ev.delta?.text) fullText += ev.delta.text;
        } catch {}
      }
    }

    clearInterval(phaseInterval);
    const clean = fullText.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    renderResults(result);
    saveToHistory(jd, result);
  } catch (e) {
    showError(e.message || 'Something went wrong.');
  } finally {
    btn.disabled = false;
    loader.classList.remove('active');
  }
}

// ── Render ──
function renderResults(data) {
  // Verdict first
  const v = data.verdict;
  const vCls = v.recommendation === 'Pursue' ? 'verdict-pursue' : v.recommendation === 'Skip' ? 'verdict-skip' : 'verdict-explore';
  const headline = v.recommendation === 'Pursue' ? 'This one\'s worth your time.' : v.recommendation === 'Skip' ? 'Not this one.' : 'Interesting — but tread carefully.';
  let verdictHTML = `
    <div class="verdict-top">
      <div class="verdict-badge ${vCls}">${v.recommendation}</div>
      <div class="verdict-headline">${headline}</div>
    </div>
    <p class="verdict-text">${v.assessment}</p>`;
  if (v.look_instead) {
    verdictHTML += `<div class="look-instead"><h4>What To Look For Instead</h4><p>${v.look_instead}</p></div>`;
  }
  document.getElementById('verdict-container').innerHTML = verdictHTML;

  // Scores
  document.getElementById('scores-container').innerHTML =
    '<div class="card-header">Match Analysis</div><div class="score-grid">' +
    data.scores.map(s => {
      const cls = s.rating === 'Strong Match' ? 'badge-strong' : s.rating === 'Partial Match' ? 'badge-partial' : 'badge-gap';
      return `<div class="score-row">
        <span class="score-dim">${s.dimension}</span>
        <span class="score-badge ${cls}">${s.rating}</span>
        <span class="score-note">${s.explanation}</span>
      </div>`;
    }).join('') + '</div>';

  // Parsed JD — Accordion
  const cats = [
    ['Actual Responsibilities', data.parsed_jd.responsibilities, 'acc-responsibilities'],
    ['Hard Skills', data.parsed_jd.hard_skills, 'acc-hard-skills'],
    ['Soft Skills', data.parsed_jd.soft_skills, 'acc-soft-skills'],
    ['Nice-to-Haves', data.parsed_jd.nice_to_haves, 'acc-nice-to-haves'],
    ['Culture Signals', data.parsed_jd.culture_signals, 'acc-culture'],
    ['Red Flags', data.parsed_jd.red_flags, 'acc-red-flags']
  ];

  document.getElementById('parsed-container').innerHTML =
    '<div class="card-header">Job Description — Decoded</div>' +
    cats.map(([title, items, cls]) => {
      if (!items || !items.length) return '';
      return `<div class="accordion-item ${cls}">
        <button class="accordion-trigger" onclick="toggleAccordion(this)">
          <span class="accordion-label"><span class="accordion-dot"></span> ${title}</span>
          <span style="display:flex;align-items:center;gap:8px;">
            <span class="accordion-count">${items.length}</span>
            <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </button>
        <div class="accordion-body">
          <div class="accordion-content">
            <ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>
          </div>
        </div>
      </div>`;
    }).join('');

  document.getElementById('results').classList.add('visible');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>

</html>
