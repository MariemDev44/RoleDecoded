<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoleDecoded</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F6F3EE;
  --surface: #FFFDFB;
  --surface-alt: #EFEBE5;
  --ink: #2C2926;
  --ink-soft: #5E5850;
  --ink-muted: #9E9790;
  --accent: #C47A6E;
  --accent-hover: #AD6458;
  --green: #6A9E82;
  --green-bg: #E6F0EA;
  --amber: #C4976A;
  --amber-bg: #F5EDDF;
  --red: #C27070;
  --red-bg: #F5E4E4;
  --border: #E2DDD6;
  --lavender: #B8AED0;
  --lavender-bg: #EEEAF5;
  --sage: #A3B5A0;
  --sage-bg: #E9EFE8;
  --radius: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,0.05);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.06);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ── Header ── */
header {
  padding: 48px 0 40px;
  border-bottom: 2px solid transparent;
  border-image: linear-gradient(to right, var(--sage), var(--lavender), var(--accent)) 1;
  margin-bottom: 48px;
}

header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ink);
}

header p {
  color: var(--ink-soft);
  font-size: 0.95rem;
  margin-top: 6px;
  font-weight: 300;
}

/* ── Sections ── */
section {
  margin-bottom: 48px;
}

.section-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--lavender);
  margin-bottom: 8px;
}

.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem;
  font-weight: 400;
  margin-bottom: 20px;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
}

/* ── Form Elements ── */
label {
  display: block;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

textarea {
  width: 100%;
  min-height: 160px;
  padding: 14px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  line-height: 1.7;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  resize: vertical;
  transition: border-color 0.2s;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
}

textarea:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.field + .field { margin-top: 20px; }

/* ── Buttons ── */
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

button {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  padding: 10px 22px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--ink);
  color: var(--bg);
}
.btn-primary:hover { background: #333; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-secondary {
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--ink-soft); color: var(--ink); }

.btn-accent {
  background: var(--accent);
  color: #fff;
  padding: 12px 28px;
  font-size: 0.88rem;
  font-weight: 600;
}
.btn-accent:hover { background: var(--accent-hover); }
.btn-accent:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Status Pill ── */
.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 100px;
  margin-bottom: 16px;
}

.status-saved { background: var(--green-bg); color: var(--green); }
.status-empty { background: var(--surface-alt); color: var(--ink-muted); }

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* ── API Key ── */
.api-key-row {
  display: flex;
  gap: 10px;
  align-items: end;
  margin-bottom: 24px;
}

.api-key-row .field { flex: 1; margin: 0; }

.api-key-row input {
  width: 100%;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color 0.2s;
}

.api-key-row input:focus { outline: none; border-color: var(--accent); }

/* ── Loading ── */
.loader {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 48px 0;
  gap: 16px;
}

.loader.active { display: flex; }

.spinner {
  width: 28px;
  height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loader-text {
  font-size: 0.85rem;
  color: var(--ink-muted);
  font-style: italic;
}

/* ── Results ── */
#results { display: none; }
#results.visible { display: block; }

.result-block {
  margin-bottom: 32px;
}

.result-block h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.15rem;
  font-weight: 400;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.result-block ul {
  list-style: none;
  padding: 0;
}

.result-block li {
  padding: 6px 0;
  font-size: 0.88rem;
  color: var(--ink-soft);
  line-height: 1.5;
}

.result-block li::before {
  content: '—';
  margin-right: 8px;
  color: var(--ink-muted);
}

.result-block p {
  font-size: 0.9rem;
  color: var(--ink-soft);
  line-height: 1.7;
}

/* ── Match Scores ── */
.score-grid {
  display: grid;
  gap: 10px;
}

.score-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--radius);
  background: var(--bg);
}

.score-dim {
  font-size: 0.84rem;
  font-weight: 500;
  color: var(--ink);
  min-width: 160px;
  flex-shrink: 0;
}

.score-badge {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  padding: 3px 10px;
  border-radius: 100px;
  white-space: nowrap;
  flex-shrink: 0;
}

.badge-strong { background: var(--green-bg); color: var(--green); }
.badge-partial { background: var(--amber-bg); color: var(--amber); }
.badge-gap { background: var(--red-bg); color: var(--red); }

.score-note {
  font-size: 0.82rem;
  color: var(--ink-muted);
  line-height: 1.4;
}

/* ── Verdict ── */
.verdict-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}

.verdict-badge {
  display: inline-block;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 28px;
  border-radius: 100px;
  margin-bottom: 16px;
}

.verdict-pursue { background: var(--sage-bg); color: var(--green); border: 1px solid var(--sage); }
.verdict-explore { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber); }
.verdict-skip { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }

.verdict-text {
  font-size: 0.92rem;
  color: var(--ink-soft);
  line-height: 1.7;
  max-width: 600px;
  margin: 0 auto;
}

/* ── Error ── */
.error-msg {
  display: none;
  background: var(--red-bg);
  color: var(--red);
  font-size: 0.85rem;
  padding: 12px 16px;
  border-radius: var(--radius);
  margin-top: 16px;
}

.error-msg.visible { display: block; }

/* ── Footer ── */
footer {
  padding: 32px 0 48px;
  border-top: 2px solid transparent;
  border-image: linear-gradient(to right, var(--lavender), var(--sage), var(--accent)) 1;
  margin-top: 24px;
  text-align: center;
  font-size: 0.78rem;
  color: var(--ink-muted);
}

/* ── Responsive ── */
@media (max-width: 600px) {
  header h1 { font-size: 1.8rem; }
  .card { padding: 20px; }
  .score-row { flex-direction: column; gap: 4px; }
  .score-dim { min-width: auto; }
  .api-key-row { flex-direction: column; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>RoleDecoded</h1>
    <p>Paste a job description. Get an honest read.</p>
  </header>

  <!-- ── Section 1: Profile ── -->
  <section id="profile-section">
    <div class="section-label">Section 1</div>
    <div class="section-title">My Profile</div>
    <div id="profile-status" class="status status-empty"><span class="status-dot"></span> No profile saved</div>
    <div class="card">
      <div class="field">
        <label for="materials">Professional Materials</label>
        <textarea id="materials" placeholder="Paste your resume, case studies, certifications…" disabled></textarea>
      </div>
      <div class="field">
        <label for="filter">My Filter</label>
        <textarea id="filter" placeholder="Values, dealbreakers, triggers, preferences…" disabled></textarea>
      </div>
      <div class="btn-row">
        <button id="btn-edit" class="btn-primary" onclick="toggleEdit()">Edit</button>
        <button id="btn-save" class="btn-secondary" onclick="saveProfile()" style="display:none;">Save</button>
        <button id="btn-cancel" class="btn-secondary" onclick="cancelEdit()" style="display:none;">Cancel</button>
      </div>
    </div>
  </section>

  <!-- ── Section 2: Analyze ── -->
  <section>
    <div class="section-label">Section 2</div>
    <div class="section-title">Analyze a Role</div>
    <div class="card">
      <div class="api-key-row">
        <div class="field">
          <label for="api-key">API Key</label>
          <input type="password" id="api-key" placeholder="sk-ant-…" />
        </div>
        <button class="btn-secondary" onclick="saveApiKey()" style="margin-bottom:0;">Save Key</button>
      </div>
      <div class="field">
        <label for="jd">Paste Job Description</label>
        <textarea id="jd" placeholder="Full job description text…" style="min-height:200px;"></textarea>
      </div>
      <div class="btn-row">
        <button id="btn-analyze" class="btn-accent" onclick="analyze()">Generate Analysis</button>
      </div>
      <div id="error-msg" class="error-msg"></div>
    </div>

    <div id="loader" class="loader">
      <div class="spinner"></div>
      <div class="loader-text">Reading between the lines…</div>
    </div>
  </section>

  <!-- ── Section 3: Results ── -->
  <section id="results">
    <div class="section-label">Section 3</div>
    <div class="section-title">Results</div>

    <div class="card" style="margin-bottom:24px;">
      <div id="parsed-jd" class="result-block"></div>
      <div id="scores" class="result-block"></div>
    </div>

    <div id="verdict-container" class="verdict-card"></div>
  </section>

  <footer>Role Decoded · MVP · Not legal or career advice</footer>
</div>

<script>
// ── State ──
let editing = false;
let backupMaterials = '';
let backupFilter = '';

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  const m = localStorage.getItem('rl_materials');
  const f = localStorage.getItem('rl_filter');
  const k = localStorage.getItem('rl_apikey');
  if (m) document.getElementById('materials').value = m;
  if (f) document.getElementById('filter').value = f;
  if (k) document.getElementById('api-key').value = k;
  updateProfileStatus();
});

function updateProfileStatus() {
  const has = localStorage.getItem('rl_materials') || localStorage.getItem('rl_filter');
  const el = document.getElementById('profile-status');
  if (has) {
    el.className = 'status status-saved';
    el.innerHTML = '<span class="status-dot"></span> Profile saved';
  } else {
    el.className = 'status status-empty';
    el.innerHTML = '<span class="status-dot"></span> No profile saved';
  }
}

function toggleEdit() {
  editing = true;
  backupMaterials = document.getElementById('materials').value;
  backupFilter = document.getElementById('filter').value;
  document.getElementById('materials').disabled = false;
  document.getElementById('filter').disabled = false;
  document.getElementById('btn-edit').style.display = 'none';
  document.getElementById('btn-save').style.display = '';
  document.getElementById('btn-cancel').style.display = '';
}

function saveProfile() {
  localStorage.setItem('rl_materials', document.getElementById('materials').value);
  localStorage.setItem('rl_filter', document.getElementById('filter').value);
  exitEdit();
  updateProfileStatus();
}

function cancelEdit() {
  document.getElementById('materials').value = backupMaterials;
  document.getElementById('filter').value = backupFilter;
  exitEdit();
}

function exitEdit() {
  editing = false;
  document.getElementById('materials').disabled = true;
  document.getElementById('filter').disabled = true;
  document.getElementById('btn-edit').style.display = '';
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('btn-cancel').style.display = 'none';
}

function saveApiKey() {
  localStorage.setItem('rl_apikey', document.getElementById('api-key').value);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('error-msg').classList.remove('visible');
}

// ── Analysis ──
async function analyze() {
  hideError();
  const apiKey = document.getElementById('api-key').value.trim();
  const materials = document.getElementById('materials').value.trim();
  const filter = document.getElementById('filter').value.trim();
  const jd = document.getElementById('jd').value.trim();

  if (!apiKey) return showError('Add your API key.');
  if (!materials && !filter) return showError('Save your profile first.');
  if (!jd) return showError('Paste a job description.');

  const btn = document.getElementById('btn-analyze');
  const loader = document.getElementById('loader');
  btn.disabled = true;
  loader.classList.add('active');
  document.getElementById('results').classList.remove('visible');

  const systemPrompt = `You are a trauma-informed career counselor for a specific person. You know their full professional history, their values, their dealbreakers, and their psychological patterns around job searching. Your job is to stand between them and a job listing and give them an honest, grounded assessment so they don't have to white-knuckle their way through parsing it themselves.

You are not a cheerleader. You are not pessimistic. You are balanced, honest, and protective without being overprotective. You know this person needs income and can't be infinitely picky. You also know that sending them back into an environment that mirrors what broke them would be worse than no job at all. Your job is to help them make the best decision with facts, because their trauma, decision fatigue, ADHD, and OCD make it nearly impossible to evaluate listings neutrally on their own.

Tone: Direct, warm, slightly irreverent. Translate corporate jargon into plain language. Don't sanitize but don't catastrophize. When something is a red flag, say so and say why. When something looks genuinely good, say so without hedging. Give a clear recommendation, not a list of pros and cons they have to weigh themselves — the decision fatigue is the whole problem.

When you receive a job description, do three things:

One — Parse the listing. Break it into these categories:
- What you'd actually be doing day to day (strip the fluff, describe the real work)
- Hard skills required (be specific about what's actually required vs. preferred)
- Soft skills and qualities they're looking for
- Nice-to-haves (things listed as preferred or bonus)
- Culture signals (what the language tells you about the environment — positive and negative)
- Red flags (anything that suggests misalignment with this person's needs, including subtle ones)
Translate every piece of corporate speak into plain language. Be accurate, not snarky for the sake of it, but don't let vague language hide what the job actually is.

Two — Score the match. Evaluate the listing against this person's profile and filter across these dimensions. For each one, rate it as Strong Match, Partial Match, or Gap, and explain why in one to two sentences:
- Values alignment: does this organization's mission and approach match what this person cares about?
- Experience relevance: how well does their background map to what's being asked for?
- Skills match: do they have the hard and soft skills required?
- Culture fit: based on the language and signals, would this environment work for their brain and their needs?
- Autonomy and structure: does this role offer the balance of external scaffolding and personal freedom they need?
- Growth potential: does this role lead somewhere, or is it a dead end?
- Logistical fit: location, schedule flexibility, sensory environment, travel requirements

Three — The verdict. Give a clear, honest overall assessment in a short paragraph. Answer: Is this worth their time and energy to apply? Why or why not? What's the best case version of this role? What's the risk? If they applied, what would they need to emphasize? If they shouldn't apply, say so directly and say why without softening it. End with one of three recommendations: Pursue, Explore with Caution, or Skip.

---

Below is this person's professional profile:
${materials}

Below is this person's personal filter — their values, dealbreakers, triggers, and what they need:
${filter}

---

CRITICAL OUTPUT FORMAT INSTRUCTION: You MUST respond with ONLY valid JSON. No markdown, no backticks, no commentary before or after. Use this exact schema:

{
  "parsed_jd": {
    "responsibilities": ["..."],
    "hard_skills": ["..."],
    "soft_skills": ["..."],
    "nice_to_haves": ["..."],
    "culture_signals": ["..."],
    "red_flags": ["..."]
  },
  "scores": [
    { "dimension": "Values Alignment", "rating": "Strong Match|Partial Match|Gap", "explanation": "..." },
    { "dimension": "Experience Relevance", "rating": "...", "explanation": "..." },
    { "dimension": "Skills Match", "rating": "...", "explanation": "..." },
    { "dimension": "Culture Fit", "rating": "...", "explanation": "..." },
    { "dimension": "Autonomy & Structure", "rating": "...", "explanation": "..." },
    { "dimension": "Growth Potential", "rating": "...", "explanation": "..." },
    { "dimension": "Logistical Fit", "rating": "...", "explanation": "..." }
  ],
  "verdict": {
    "recommendation": "Pursue|Explore with Caution|Skip",
    "assessment": "Your honest overall assessment paragraph here."
  }
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: systemPrompt,
        messages: [{ role: 'user', content: `Analyze this job description:\n\n${jd}` }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    renderResults(result);
  } catch (e) {
    showError(e.message || 'Something went wrong.');
  } finally {
    btn.disabled = false;
    loader.classList.remove('active');
  }
}

// ── Render ──
function renderResults(data) {
  // Parsed JD
  const parsedEl = document.getElementById('parsed-jd');
  const sections = [
    ['Actual Responsibilities', data.parsed_jd.responsibilities],
    ['Hard Skills', data.parsed_jd.hard_skills],
    ['Soft Skills', data.parsed_jd.soft_skills],
    ['Nice-to-Haves', data.parsed_jd.nice_to_haves],
    ['Culture Signals', data.parsed_jd.culture_signals],
    ['Red Flags', data.parsed_jd.red_flags]
  ];

  parsedEl.innerHTML = '<h3>Job Description — Decoded</h3>' +
    sections.map(([title, items]) => {
      if (!items || items.length === 0) return '';
      return `<div style="margin-bottom:16px;">
        <div style="font-size:0.78rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;">${title}</div>
        <ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>`;
    }).join('');

  // Scores
  const scoresEl = document.getElementById('scores');
  scoresEl.innerHTML = '<h3>Match Analysis</h3><div class="score-grid">' +
    data.scores.map(s => {
      const cls = s.rating === 'Strong Match' ? 'badge-strong' : s.rating === 'Partial Match' ? 'badge-partial' : 'badge-gap';
      return `<div class="score-row">
        <span class="score-dim">${s.dimension}</span>
        <span class="score-badge ${cls}">${s.rating}</span>
        <span class="score-note">${s.explanation}</span>
      </div>`;
    }).join('') + '</div>';

  // Verdict
  const v = data.verdict;
  const vCls = v.recommendation === 'Pursue' ? 'verdict-pursue' : v.recommendation === 'Skip' ? 'verdict-skip' : 'verdict-explore';
  document.getElementById('verdict-container').innerHTML =
    `<div class="verdict-badge ${vCls}">${v.recommendation}</div>
     <p class="verdict-text">${v.assessment}</p>`;

  document.getElementById('results').classList.add('visible');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>

</body>
</html>
